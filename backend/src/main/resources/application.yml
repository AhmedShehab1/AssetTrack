spring:
  application:
    name: AssetTrack
  datasource:
    url: jdbc:postgresql://localhost:5432/assettrack
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: ${MAILTRAP_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAILTRAP_PORT:2525}
    username: ${MAILTRAP_USERNAME}
    password: ${MAILTRAP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  issuer: assettrack-api

# RSA keys
rsa:
  private-key-location: ${RSA_PRIVATE_KEY_LOCATION:classpath:private_pkcs8.pem}
  public-key-location: ${RSA_PUBLIC_KEY_LOCATION:classpath:public.pem}
