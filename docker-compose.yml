version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: assettrack_backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - assettrack_keys:/var/assettrack/keys
    networks:
      - assettrack_network

  postgres:
    image: postgres:15-alpine
    container_name: assettrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assettrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assettrack_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: assettrack_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@assettrack.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - postgres
    networks:
      - assettrack_network

volumes:
  postgres_data:
  assettrack_keys:

networks:
  assettrack_network:
    driver: bridge
