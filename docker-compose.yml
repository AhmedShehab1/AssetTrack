version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: assettrack_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/assettrack}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-password}
      MAILTRAP_HOST: ${MAILTRAP_HOST:-sandbox.smtp.mailtrap.io}
      MAILTRAP_PORT: ${MAILTRAP_PORT:-2525}
      MAILTRAP_USERNAME: ${MAILTRAP_USERNAME:-}
      MAILTRAP_PASSWORD: ${MAILTRAP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@assettrack.local}
      ALERTS_RECIPIENT_EMAIL: ${ALERTS_RECIPIENT_EMAIL:-admin@assettrack.com}
      RSA_PRIVATE_KEY_LOCATION: ${RSA_PRIVATE_KEY_LOCATION:-file:/var/assettrack/keys/private_pkcs8.pem}
      RSA_PUBLIC_KEY_LOCATION: ${RSA_PUBLIC_KEY_LOCATION:-file:/var/assettrack/keys/public.pem}
    ports:
      - "8080:8080"
    volumes:
      - assettrack_keys:/var/assettrack/keys
    networks:
      - assettrack_network

  postgres:
    image: postgres:15-alpine
    container_name: assettrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assettrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assettrack_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: assettrack_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@assettrack.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - postgres
    networks:
      - assettrack_network

volumes:
  postgres_data:
  assettrack_keys:

networks:
  assettrack_network:
    driver: bridge
